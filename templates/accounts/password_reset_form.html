{% extends "base/base.html" %}
{% block title %}Forgot Password — FashionHub{% endblock %}

{% block start %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-sm" style="border-radius:16px;">
                <div class="card-body p-4 p-md-5">

                    <div class="text-center mb-4">
                        <div class="bg-warning rounded-circle d-inline-flex align-items-center
                                    justify-content-center mb-3"
                             style="width:56px;height:56px;">
                            <i class="bi bi-lock text-dark fs-4"></i>
                        </div>
                        <h4 class="fw-bold mb-1">Forgot your password?</h4>
                        <p class="text-muted small">
                            Enter your email and we'll send you a reset link.
                        </p>
                    </div>

                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-semibold small">Email address</label>
                            <input type="email" name="email" required
                                   class="form-control form-control-lg"
                                   placeholder="you@example.com"
                                   style="border-radius:10px;">
                        </div>
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-warning btn-lg fw-bold"
                                    style="border-radius:10px;">
                                <i class="bi bi-send me-2"></i>Send Reset Link
                            </button>
                        </div>
                    </form>

                    <div class="text-center mt-4">
                        <a href="{% url 'login' %}" class="text-muted small text-decoration-none">
                            <i class="bi bi-arrow-left me-1"></i>Back to Login
                        </a>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
