{% extends "base/base.html" %}
{% block title %}Check Your Email — FashionHub{% endblock %}

{% block start %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-sm text-center" style="border-radius:16px;">
                <div class="card-body p-4 p-md-5">

                    <div class="bg-success rounded-circle d-inline-flex align-items-center
                                justify-content-center mb-3"
                         style="width:56px;height:56px;">
                        <i class="bi bi-envelope-check text-white fs-4"></i>
                    </div>
                    <h4 class="fw-bold mb-2">Check your inbox</h4>
                    <p class="text-muted small mb-4">
                        We've sent a password reset link to your email address.
                        The link expires in <strong>24 hours</strong>.
                    </p>
                    <p class="text-muted small">
                        Didn't get it? Check your spam folder or
                        <a href="{% url 'password_reset' %}" class="text-warning fw-semibold text-decoration-none">
                            try again
                        </a>.
                    </p>

                    <a href="{% url 'login' %}" class="btn btn-outline-dark btn-sm mt-3 rounded-pill px-4">
                        <i class="bi bi-arrow-left me-1"></i>Back to Login
                    </a>

                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
