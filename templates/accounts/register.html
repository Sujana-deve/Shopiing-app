{% extends "base/base.html" %}
{% block title %}Register - FashionHub{% endblock %}

{% block start %}
<div class="container mt-4" style="max-width: 580px;">
    <div class="card border-0 shadow-sm rounded-3 p-4">

        <div class="text-center mb-4">
            <i class="bi bi-bag-heart text-warning" style="font-size: 2.8rem;"></i>
            <h4 class="fw-bold mt-2">Create Account</h4>
            <p class="text-muted small">Join FashionHub and start shopping</p>
        </div>

        <form method="POST">
            {% csrf_token %}

            <div class="row g-3">

                <!-- First + Last name -->
                <div class="col-6">
                    <label class="form-label fw-semibold small">First Name</label>
                    <input type="text"
                           name="first_name"
                           class="form-control"
                           placeholder="John"
                           required>
                </div>
                <div class="col-6">
                    <label class="form-label fw-semibold small">Last Name</label>
                    <input type="text"
                           name="last_name"
                           class="form-control"
                           placeholder="Doe"
                           required>
                </div>

                <!-- Email -->
                <div class="col-12">
                    <label class="form-label fw-semibold small">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0">
                            <i class="bi bi-envelope text-muted"></i>
                        </span>
                        <input type="email"
                               name="email"
                               class="form-control border-start-0"
                               placeholder="you@example.com"
                               required>
                    </div>
                </div>

                <!-- Password -->
                <div class="col-12">
                    <label class="form-label fw-semibold small">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0">
                            <i class="bi bi-lock text-muted"></i>
                        </span>
                        <input type="password"
                               name="password"
                               id="password1"
                               class="form-control border-start-0"
                               placeholder="Min 6 characters"
                               required
                               oninput="checkStrength(this.value)">
                        <button class="btn btn-light border" type="button"
                                onclick="togglePass('password1','eye1')">
                            <i class="bi bi-eye" id="eye1"></i>
                        </button>
                    </div>
                    <!-- Password strength bar -->
                    <div class="mt-1" id="strengthWrap" style="display:none;">
                        <div class="progress" style="height:5px;">
                            <div id="strengthBar" class="progress-bar" style="width:0%;"></div>
                        </div>
                        <small id="strengthLabel" class="text-muted"></small>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div class="col-12">
                    <label class="form-label fw-semibold small">Confirm Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0">
                            <i class="bi bi-lock-fill text-muted"></i>
                        </span>
                        <input type="password"
                               name="confirm_password"
                               id="password2"
                               class="form-control border-start-0"
                               placeholder="Repeat your password"
                               required>
                        <button class="btn btn-light border" type="button"
                                onclick="togglePass('password2','eye2')">
                            <i class="bi bi-eye" id="eye2"></i>
                        </button>
                    </div>
                    <div id="matchMsg" class="small mt-1"></div>
                </div>

                <!-- Terms -->
                <div class="col-12">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="terms" required>
                        <label class="form-check-label small text-muted" for="terms">
                            I agree to the <a href="#" class="text-warning text-decoration-none">Terms &amp; Conditions</a>
                        </label>
                    </div>
                </div>

                <!-- Submit -->
                <div class="col-12 d-grid mt-1">
                    <button type="submit" class="btn btn-warning btn-lg fw-bold text-dark">
                        <i class="bi bi-person-plus me-2"></i>Create Account
                    </button>
                </div>

            </div>
        </form>

        <hr class="my-3">

        <p class="text-center text-muted small mb-0">
            Already have an account?
            <a href="{% url 'login' %}" class="text-warning fw-semibold text-decoration-none">
                Login here
            </a>
        </p>

    </div>
</div>

<script>
function togglePass(fieldId, iconId) {
    const f = document.getElementById(fieldId);
    const i = document.getElementById(iconId);
    f.type = f.type === 'password' ? 'text' : 'password';
    i.classList.toggle('bi-eye');
    i.classList.toggle('bi-eye-slash');
}

function checkStrength(val) {
    const wrap  = document.getElementById('strengthWrap');
    const bar   = document.getElementById('strengthBar');
    const label = document.getElementById('strengthLabel');
    wrap.style.display = val.length ? 'block' : 'none';

    let score = 0;
    if (val.length >= 6)                        score++;
    if (val.length >= 10)                       score++;
    if (/[A-Z]/.test(val))                      score++;
    if (/[0-9]/.test(val))                      score++;
    if (/[^A-Za-z0-9]/.test(val))              score++;

    const levels = [
        { w: '20%',  cls: 'bg-danger',  txt: 'Very weak'  },
        { w: '40%',  cls: 'bg-danger',  txt: 'Weak'       },
        { w: '60%',  cls: 'bg-warning', txt: 'Fair'       },
        { w: '80%',  cls: 'bg-info',    txt: 'Good'       },
        { w: '100%', cls: 'bg-success', txt: 'Strong 💪'  },
    ];
    const lvl = levels[Math.min(score, 4)];
    bar.style.width = lvl.w;
    bar.className   = 'progress-bar ' + lvl.cls;
    label.textContent = lvl.txt;
}

// Live match check
document.getElementById('password2').addEventListener('input', function () {
    const p1  = document.getElementById('password1').value;
    const msg = document.getElementById('matchMsg');
    if (!this.value) { msg.textContent = ''; return; }
    if (this.value === p1) {
        msg.innerHTML = '<span class="text-success"><i class="bi bi-check-circle me-1"></i>Passwords match</span>';
    } else {
        msg.innerHTML = '<span class="text-danger"><i class="bi bi-x-circle me-1"></i>Passwords do not match</span>';
    }
});
</script>
{% endblock %}
