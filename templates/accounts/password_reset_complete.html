{% extends "base/base.html" %}
{% block title %}Password Updated — FashionHub{% endblock %}

{% block start %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-sm text-center" style="border-radius:16px;">
                <div class="card-body p-4 p-md-5">

                    <div class="bg-success rounded-circle d-inline-flex align-items-center
                                justify-content-center mb-3"
                         style="width:56px;height:56px;">
                        <i class="bi bi-shield-check text-white fs-4"></i>
                    </div>
                    <h4 class="fw-bold mb-2">Password updated!</h4>
                    <p class="text-muted small mb-4">
                        Your password has been changed successfully.
                        You can now log in with your new password.
                    </p>
                    <a href="{% url 'login' %}" class="btn btn-warning btn-lg fw-bold rounded-pill px-5">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Log In
                    </a>

                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
