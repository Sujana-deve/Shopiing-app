{% extends "base/base.html" %}
{% block title %}Login — FashionHub{% endblock %}

{% block start %}
<div class="container py-5" style="max-width: 480px;">
    <div class="card border-0 shadow-sm rounded-4 p-4 p-md-5">

        <div class="text-center mb-4">
            <div class="bg-warning rounded-circle d-inline-flex align-items-center
                        justify-content-center mb-3"
                 style="width:56px; height:56px;">
                <i class="bi bi-person text-dark fs-4"></i>
            </div>
            <h4 class="fw-bold mb-1">Welcome Back</h4>
            <p class="text-muted small mb-0">Login to your FashionHub account</p>
        </div>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-semibold small">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0">
                        <i class="bi bi-envelope text-muted"></i>
                    </span>
                    <input type="email"
                           name="email"
                           class="form-control border-start-0"
                           placeholder="you@example.com"
                           required autofocus>
                </div>
            </div>

            <div class="mb-1">
                <label class="form-label fw-semibold small">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0">
                        <i class="bi bi-lock text-muted"></i>
                    </span>
                    <input type="password"
                           name="password"
                           id="passwordField"
                           class="form-control border-start-0"
                           placeholder="Enter your password"
                           required>
                    <button class="btn btn-light border" type="button"
                            onclick="togglePassword()">
                        <i class="bi bi-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <!-- Forgot password link -->
            <div class="text-end mb-4">
                <a href="{% url 'password_reset' %}"
                   class="text-muted small text-decoration-none">
                    Forgot your password?
                </a>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-dark btn-lg fw-semibold"
                        style="border-radius:10px;">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Login
                </button>
            </div>
        </form>

        <hr class="my-4">

        <p class="text-center text-muted small mb-0">
            Don't have an account?
            <a href="{% url 'register' %}" class="text-warning fw-semibold text-decoration-none">
                Register here
            </a>
        </p>

    </div>
</div>

{% block extra_js %}
<script>
    function togglePassword() {
        const field = document.getElementById('passwordField');
        const icon  = document.getElementById('eyeIcon');
        if (field.type === 'password') {
            field.type = 'text';
            icon.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            field.type = 'password';
            icon.classList.replace('bi-eye-slash', 'bi-eye');
        }
    }
</script>
{% endblock %}

{% endblock %}
