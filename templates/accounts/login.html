{% extends "base/base.html" %}
{% block title %}Login - FashionHub{% endblock %}

{% block start %}
<div class="container mt-5" style="max-width: 480px;">
    <div class="card border-0 shadow-sm rounded-3 p-4">

        <div class="text-center mb-4">
            <i class="bi bi-person-circle text-warning" style="font-size: 2.8rem;"></i>
            <h4 class="fw-bold mt-2">Welcome Back</h4>
            <p class="text-muted small">Login to your FashionHub account</p>
        </div>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-semibold">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0">
                        <i class="bi bi-envelope text-muted"></i>
                    </span>
                    <input type="email"
                           name="email"
                           class="form-control border-start-0"
                           placeholder="you@example.com"
                           required autofocus>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0">
                        <i class="bi bi-lock text-muted"></i>
                    </span>
                    <input type="password"
                           name="password"
                           id="passwordField"
                           class="form-control border-start-0"
                           placeholder="Enter your password"
                           required>
                    <button class="btn btn-light border" type="button"
                            onclick="togglePassword()">
                        <i class="bi bi-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-dark btn-lg fw-semibold">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Login
                </button>
            </div>
        </form>

        <hr class="my-3">

        <p class="text-center text-muted small mb-0">
            Don't have an account?
            <a href="{% url 'register' %}" class="text-warning fw-semibold text-decoration-none">
                Register here
            </a>
        </p>

    </div>
</div>

<script>
function togglePassword() {
    const field = document.getElementById('passwordField');
    const icon  = document.getElementById('eyeIcon');
    if (field.type === 'password') {
        field.type = 'text';
        icon.classList.replace('bi-eye', 'bi-eye-slash');
    } else {
        field.type = 'password';
        icon.classList.replace('bi-eye-slash', 'bi-eye');
    }
}
</script>
{% endblock %}
